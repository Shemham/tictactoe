<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-top: 1.5rem;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.04); }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #mode-toggle {
      background: #0f3460;
      color: #a8dadc;
      border: 2px solid #a8dadc;
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-top: 1.2rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 10px;
      padding: 0.5rem 1.2rem;
      border: 2px solid #0f3460;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs CPU</button>
  </div>
  <div id="scores">
    <div class="score-box x-score">X<span id="score-x">0</span></div>
    <div class="score-box draw-score">Draws<span id="score-d">0</span></div>
    <div class="score-box o-score">O<span id="score-o">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const modeBtn = document.getElementById('mode-toggle');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, vsCPU;
    let scores = { X: 0, O: 0, D: 0 };
    vsCPU = false;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      statusEl.textContent = `Player X's turn`;
      render();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return;
      play(i);
      if (!gameOver && vsCPU && current === 'O') {
        setTimeout(cpuMove, 350);
      }
    }

    function play(i) {
      board[i] = current;
      const winLine = checkWin(board, current);
      if (winLine) {
        endGame(current, winLine);
      } else if (board.every(c => c)) {
        endGame(null);
      } else {
        current = current === 'X' ? 'O' : 'X';
        const label = (vsCPU && current === 'O') ? 'CPU (O)' : `Player ${current}`;
        statusEl.textContent = `${label}'s turn`;
      }
      render();
      if (winLine) highlightWin(winLine);
    }

    function checkWin(b, player) {
      return WINS.find(line => line.every(i => b[i] === player)) || null;
    }

    function endGame(winner, winLine) {
      gameOver = true;
      if (winner) {
        const label = (vsCPU && winner === 'O') ? 'CPU wins!' : `Player ${winner} wins!`;
        statusEl.textContent = label;
        scores[winner]++;
      } else {
        statusEl.textContent = "It's a draw!";
        scores.D++;
      }
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    function highlightWin(line) {
      const cells = boardEl.querySelectorAll('.cell');
      line.forEach(i => cells[i].classList.add('win'));
    }

    // Minimax CPU
    function cpuMove() {
      const best = minimax(board, 'O', 0);
      play(best.index);
    }

    function minimax(b, player, depth) {
      const opp = player === 'O' ? 'X' : 'O';
      if (checkWin(b, 'O')) return { score: 10 - depth };
      if (checkWin(b, 'X')) return { score: depth - 10 };
      const empty = b.reduce((a, v, i) => v === '' ? [...a, i] : a, []);
      if (!empty.length) return { score: 0 };

      const moves = empty.map(i => {
        const nb = [...b];
        nb[i] = player;
        const result = minimax(nb, opp, depth + 1);
        return { index: i, score: result.score };
      });

      return moves.reduce((best, m) =>
        player === 'O' ? (m.score > best.score ? m : best)
                        : (m.score < best.score ? m : best)
      );
    }

    restartBtn.addEventListener('click', init);
    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      init();
    });

    init();
  </script>
</body>
</html>
